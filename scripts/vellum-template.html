      // Drag-drop image files onto the composer.
      composer.addEventListener("dragover", (e) => { if (pending) { e.preventDefault(); composer.classList.add("drop-active"); } });
      composer.addEventListener("dragleave", (e) => { if (e.target === composer) composer.classList.remove("drop-active"); });
      composer.addEventListener("drop", (e) => {
        if (!pending) return;
        e.preventDefault();
        composer.classList.remove("drop-active");
        Array.from((e.dataTransfer && e.dataTransfer.files) || []).filter((f) => /^image\//.test(f.type)).forEach((f) => uploadAttachment(f));
      });

      // A new note's id is predictable (max + 1, matching the server), so the composer
      // can wear the note's eventual pin color before it exists.
      const nextNoteId = () => (notes.length ? Math.max(...notes.map((n) => n.id || 0)) + 1 : 1);

      // ---- scoped notes: whole-scene & audio feedback (no element click needed) ----
      const round2 = (n) => Math.round(n * 100) / 100;
      const audioBasename = (a) => { const s = (a && a.getAttribute("src")) || ""; const base = s.split(/[\\/]/).pop() || null; try { return base ? decodeURIComponent(base) : null; } catch { return base; } };
      // Persist the parsed composition (scene map, dims, audio clip layout, captions flag) to
      // notes/composition.json so the consuming agent can resolve any note's scene/timing without
      // re-running the GSAP timeline. The browser is the source of truth; best-effort, never blocks.
      function postComposition(doc) {
        try {
          const clip = (a) => { const x = audioTimings.find((t) => t.a === a) || {}; return { src: audioBasename(a), start: round2(x.start || 0), dur: x.dur || null }; };
          const manifest = {
            width: compW, height: compH, duration: round2(duration),
            fps: fps && fps > 0 ? fps : null,
            scenes: scenes.map((s) => ({ id: s.id, start: round2(s.start), duration: s.duration != null ? round2(s.duration) : null })),
            audio: { voice: voiceEls.map(clip), music: musicEl ? [clip(musicEl)] : [] },
            captions: vttCues.length > 0,
          };
          // Capture the server-stamped baseline hash from the round-trip so renderNoteDots/
          // renderList can flag notes pinned against an older index.html (content drift).
          fetch("/api/composition", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify(manifest) })
            .then((r) => r.json())
            .then((d) => {
              if (d && d.provenance && d.provenance.indexHash) {
                baselineHash = d.provenance.indexHash;
                // This POST is fire-and-forget from mount(), so loadNotes()/renderNoteDots()/
                // renderList() may have already painted with baselineHash still null (no drift shown).
                // Repaint now that the baseline is known so the drift signal isn't missed on first load.
                if (notes && notes.length) { renderNoteDots(); renderList(); }
              }
            })
            .catch(() => {});
        } catch (e) {}
      }
      // Best-effort VO script text: HyperFrames doesn't embed it on <audio>, but if a
      // composition tags clips with a caption/transcript/label attribute, surface it.
      function clipScript(a) {
        if (!a) return null;
        for (const attr of ["data-transcript", "data-caption", "data-script", "data-text", "aria-label", "title", "data-label"]) {
          const v = a.getAttribute(attr);
          if (v && v.trim()) return v.trim().slice(0, 500);
        }
        return null;
      }
      const clipActiveAt = (x, t) => t >= x.start && (x.dur ? t < x.start + x.dur : true);

      // ---- VO transcript (WebVTT) ----
      // HyperFrames' TTS/transcribe step writes timing/voiceover-captions.vtt with
      // composition-time cues. Vellum reads it (no hyperframes changes) to attach the real
      // spoken line to audio notes. Absent in many comps → enrichment quietly degrades.
      function vttTime(s) {
        const m = String(s).trim().match(/(?:(\d+):)?(\d{1,2}):(\d{2})(?:[.,](\d{1,3}))?/);
        if (!m) return null;
        return (+(m[1] || 0)) * 3600 + (+m[2]) * 60 + (+m[3]) + (+((m[4] || "0").padEnd(3, "0"))) / 1000;
      }
      function parseVtt(text) {
        const cues = [];
        for (const block of text.replace(/\r/g, "").split(/\n\n+/)) {
          const lines = block.split("\n").filter((l) => l.trim());
          const ti = lines.findIndex((l) => l.includes("-->"));
          if (ti < 0) continue;
          const [a, b] = lines[ti].split("-->");
          const start = vttTime(a), end = vttTime(b);
          if (start == null || end == null) continue;
          const txt = lines.slice(ti + 1).join(" ").trim();
          if (txt) cues.push({ start, end, text: txt });
        }
        return cues;
      }
      async function loadCaptions() {
        vttCues = [];
        try {
          const r = await fetch("timing/voiceover-captions.vtt", { cache: "no-cache" });
          if (!r.ok) return;
          const t = await r.text();
          if (t.includes("WEBVTT")) vttCues = parseVtt(t);
        } catch (e) {}
      }
      const cueAt = (t) => vttCues.find((c) => t >= c.start && t < c.end) || null;
      // The spoken text overlapping a clip's [start, end) window, joined — the clip's script.
      function scriptForWindow(start, dur, cap) {
        if (!vttCues.length || start == null) return null;
        const hi = dur ? start + dur : Infinity;
        const txt = vttCues.filter((c) => c.end > start && c.start < hi).map((c) => c.text).join(" ").trim();
        return txt ? txt.slice(0, cap) : null;
      }

      // Snapshot the audio at composition-time t: the active VO + music clips (filename +
      // local timestamp + spoken line/script), plus the previous/next VO clips (with a short
      // script) so an agent has the words and the series context.
      function captureAudioContext(t) {
        const voiceTim = audioTimings.filter((x) => voiceEls.includes(x.a)).sort((p, q) => p.start - q.start);
        const musicTim = audioTimings.filter((x) => x.a === musicEl);
        const winScript = (x, cap) => scriptForWindow(x.start, x.dur, cap) || clipScript(x.a);
        const voiceDetail = (x) => x ? {
          src: audioBasename(x.a), start: round2(x.start), dur: x.dur || null,
          at: round2(Math.max(0, (t - x.start) + (x.mediaStart || 0))),
          line: (cueAt(t) || {}).text || null, script: winScript(x, 800),
        } : null;
        const voiceBrief = (x) => x ? { src: audioBasename(x.a), start: round2(x.start), script: winScript(x, 200) } : null;
        const activeVoice = voiceTim.find((x) => clipActiveAt(x, t)) || null;
        const activeMusic = musicTim.find((x) => clipActiveAt(x, t)) || musicTim[0] || null;
        let prev = null, next = null;
        if (activeVoice) {
          const i = voiceTim.indexOf(activeVoice);
          prev = voiceBrief(voiceTim[i - 1]); next = voiceBrief(voiceTim[i + 1]);
        } else {
          prev = voiceBrief([...voiceTim].reverse().find((x) => x.start < t)); // most recent before t
          next = voiceBrief(voiceTim.find((x) => x.start >= t));               // next upcoming
        }
        const music = activeMusic ? { src: audioBasename(activeMusic.a), start: round2(activeMusic.start), dur: activeMusic.dur || null, at: round2(Math.max(0, (t - activeMusic.start) + (activeMusic.mediaStart || 0))) } : null;
        return { voice: voiceDetail(activeVoice), music, prev, next };
      }
      // One-line summary of an audio note's captured context, for the composer/tooltip/list.
      function audioSummary(a) {
        if (!a) return "on the audio at this moment";
        const bits = [];
        if (a.voice && a.voice.src) bits.push(`VO ${a.voice.src}${a.voice.at != null ? ` @ ${fmt(a.voice.at)}` : ""}`);
        if (a.music && a.music.src) bits.push(`music ${a.music.src}`);
        let s = bits.length ? `on ${bits.join(" · ")}` : "on the audio at this moment";
        const line = a.voice && (a.voice.line || a.voice.script);
        if (line) s += ` — “${line.length > 60 ? line.slice(0, 57) + "…" : line}”`;
        return s;
      }
      // ---- in/out time-span selection ----
      // The I/O keys mark in/out at the playhead; the live selection is adopted by the next note
      // (any kind), turning it into an [time, timeEnd] interval. spanRange normalizes min/max and
      // requires ≥0.01s so a backward selection still yields time<timeEnd before it reaches the server.
      function spanRange() {
        if (spanIn == null || spanOut == null) return null;
        const a = Math.min(spanIn, spanOut), b = Math.max(spanIn, spanOut);
        return b - a >= 0.01 ? { a, b } : null;
      }
      function clearSpan() { spanIn = spanOut = null; renderSpanSel(); }
      function setSpanMark(which) {
        if (!player) return;
        const t = round2(player.getTime());
        if (which === "in") spanIn = t; else spanOut = t;
        renderSpanSel();
        const r = spanRange();
        flash(r ? `In ${fmt(r.a)} → Out ${fmt(r.b)} · ${(r.b - r.a).toFixed(2)}s — now add a note`
                : `${which === "in" ? "In" : "Out"} ${fmt(t)} — set the other mark`);
      }
      // Stamp the current selection onto a pending note: time → selection start, timeEnd → end.
      function applyPendingSpan(p) { const r = spanRange(); if (r) { p.time = r.a; p.timeEnd = r.b; } return p; }
      // Draw the selection band in PERCENT (resize-safe like note-dots): both marks → a band,
      // one mark → a thin single marker, neither / zero-length → hidden.
      function renderSpanSel() {
        if (!spanSel) return;
        const r = spanRange();
        if (r) {
          const lo = timelinePct(r.a), hi = timelinePct(r.b);
          spanSel.className = "span-sel";
          spanSel.style.left = `${lo}%`;
          spanSel.style.width = `${Math.max(0, hi - lo)}%`;
          spanSel.style.display = "block";
          return;
        }
        const mark = spanIn != null ? spanIn : spanOut;
        if (mark != null && (spanIn == null || spanOut == null)) {
          const p = timelinePct(mark);
          if (p >= 0) {
            spanSel.className = "span-sel single";
            spanSel.style.left = `${p}%`;
            spanSel.style.width = "0";
            spanSel.style.display = "block";
            return;
          }
        }
        spanSel.style.display = "none";
      }

      // Open the composer for a whole-scene, audio, or time-span note at the current moment, anchored
      // beside the left dock. Works outside note mode; refuses to clobber an unsaved note.
      function openScopedComposer(kind, anchorEl) {
        if (pending && composerText.value.trim()) { flash("Save or cancel the open note first"); return; }
        if (kind === "span" && !spanRange()) { flash("Mark in and out first — press I, then O"); return; }
        clearHover();
        revokePendingAttachments();
        const t = player ? player.getTime() : 0;
        pending = { kind, time: t, scene: sceneAt(t) };
        if (kind === "audio") pending.audio = captureAudioContext(t);
        applyPendingSpan(pending);
        const r = (anchorEl || dock).getBoundingClientRect();
        openComposer(r.right + 10, r.top);
      }

      function openComposer(clientX, clientY) {
        // Tear down any armed ghost capture before (re)opening the composer. openComposer is the common
        // funnel for the dock/scoped, drawer-edit, placement, and finishGhostCapture paths — so a
        // capture armed against the old pending can't survive into a new/competing note (which would
        // crash a later frame drag on a null/wrong pending and freeze the .capturing overlay). No-op on
        // the finishGhostCapture path, which already cleared it.
        if (ghostCapture) endGhostCapture();
        const region = pending.w != null;
        const editLabel = pending.editId ? `note-${pending.editId} · edit` : "new note";
        pending.color = colorFor(pending.editId || nextNoteId());
        composer.style.setProperty("--c", pending.color);
        const span = pending.timeEnd != null && pending.timeEnd > pending.time;
        const where = pending.kind === "scene" ? "whole scene"
          : pending.kind === "audio" ? "audio"
          : pending.kind === "span" ? `time span ${(pending.timeEnd - pending.time).toFixed(2)}s`
          : region ? `box ${pending.w}×${pending.h}%` : `pin ${pending.x}%, ${pending.y}%`;
        composerMeta.textContent = `${editLabel} · ${span ? `${fmt(pending.time)}–${fmt(pending.timeEnd)}` : fmt(pending.time)} · ${pending.scene || ""} · ${where}`;
        renderComposerTarget();
        renderComposerSeverity();
        renderComposerDesired();
        // Clone any saved attachments (edit reopens via {...note}) so removing a thumbnail can't mutate
        // the cached note array before a reload; fresh placements start empty.
        pending.attachments = Array.isArray(pending.attachments) ? pending.attachments.map((a) => ({ ...a })) : [];
        renderComposerAttachments();
        if (!pending.editId && pending.candidates && pending.candidates[pending.candIndex]) {
          flashEl(pending.candidates[pending.candIndex].el, pending.color);
        }
        composerText.value = pending.text || "";
        setSaveLabel(pending.editId ? "Save changes" : "Save note");
        const vp = viewport.getBoundingClientRect();
        composer.style.left = `${Math.min(clientX - vp.left, vp.width - 360)}px`;
        composer.style.top = `${Math.min(clientY - vp.top + 14, vp.height - 220)}px`;
        composer.style.display = "block";
        composerText.focus();
      }

      function openComposerForEdit(note, clientX, clientY) {
        pending = { ...note, editId: note.id };
        openComposer(clientX, clientY);
      }

      // Drag the composer by its top bar to uncover whatever it's sitting on. The
      // composer is absolutely positioned inside #viewport, so offsetLeft/Top are
      // already viewport-relative; clamp so it can't be dragged out of reach.
      const composerDrag = document.getElementById("composer-drag");
      let composerGrab = null;
      function onComposerDragMove(e) {
        if (!composerGrab) return;
        const vp = viewport.getBoundingClientRect();
        const x = Math.min(Math.max(0, e.clientX - composerGrab.dx), Math.max(0, vp.width - composer.offsetWidth));
        const y = Math.min(Math.max(0, e.clientY - composerGrab.dy), Math.max(0, vp.height - composer.offsetHeight));
        composer.style.left = `${x}px`;
        composer.style.top = `${y}px`;
      }
      function endComposerDrag() {
        composerGrab = null;
        window.removeEventListener("mousemove", onComposerDragMove);
        window.removeEventListener("mouseup", endComposerDrag);
      }
      composerDrag.addEventListener("mousedown", (e) => {
        e.preventDefault();
        composerGrab = { dx: e.clientX - composer.offsetLeft, dy: e.clientY - composer.offsetTop };
        window.addEventListener("mousemove", onComposerDragMove);
        window.addEventListener("mouseup", endComposerDrag);
      });

      document.getElementById("composer-cancel").onclick = () => { composer.style.display = "none"; revokePendingAttachments(); pending = null; drainReload(); };
      composerSaveBtn.onclick = async () => {
        const text = composerText.value.trim();
        if (!text || !pending) { composer.style.display = "none"; return; }
        if (pending.editId) {
          // severity rides the edit PATCH so the human can both change and clear it; null tells the
          // server to drop the field (the server treats null/invalid as clear).
          // severity + attachments ride the edit PATCH so the human can change/clear them; a present
          // key tells the server to replace (severity null = drop). Transient _obj is stripped.
          const res = await fetch(`${API}/${encodeURIComponent(pending.editId)}`, {
            method: "PATCH",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({
              text,
              severity: pending.severity ?? null,
              attachments: (pending.attachments || []).map(({ file, name, bytes, type, w, h }) => ({ file, name, bytes, type, w, h })),
              // Desired-state markup rides the PATCH as present keys so the human can re-drag or clear:
              // null tells the server to drop the field (it treats null/invalid as clear).
              desiredBox: pending.desiredBox ?? null,
              arrow: pending.arrow ?? null,
            }),
          });
          if (!res.ok) { flash("Update failed"); return; }
        } else {
          // Explicit payload — pending also carries candidate DOM elements that must
          // never be serialized.
          const { time, x, y, w, h, scene, target, kind, audio, timeEnd } = pending;
          const payload = { time, x, y, w, h, scene, target, text };
          if (kind) payload.kind = kind;
          if (audio) payload.audio = audio;
          if (timeEnd != null) payload.timeEnd = timeEnd; // load-bearing — the interval is lost without this
          if (pending.severity) payload.severity = pending.severity;
          if (pending.desiredBox) payload.desiredBox = pending.desiredBox; // the target position/size the reviewer wants
          if (pending.arrow) payload.arrow = pending.arrow;                // a from→to direction
          if (pending.attachments && pending.attachments.length) // strip the transient _obj before serializing
            payload.attachments = pending.attachments.map(({ file, name, bytes, type, w, h }) => ({ file, name, bytes, type, w, h }));
          await fetch(API, { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify(payload) });
          // Consume the live in/out marks once a span-bearing note adopts them — otherwise the stale
          // range bleeds into and overwrites the time of every subsequent note (clearSpan was only
          // wired to Escape before).
          if (timeEnd != null) clearSpan();
        }
        composer.style.display = "none";
        revokePendingAttachments();
        pending = null;
        flash("Note saved");
        loadNotes();
        drainReload(); // a live edit deferred while this note was open can now fire
      };

      // ⌘+Enter (mac) / Ctrl+Enter (win/linux) saves without reaching for the button.
      composerText.addEventListener("keydown", (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === "Enter") {
          e.preventDefault();
          composerSaveBtn.click();
        }
      });

      // ---- left feedback dock ----
      const dock = document.getElementById("feedback-dock");
      const dockToggle = document.getElementById("dock-toggle");
      const DOCK_KEY = "vellum-dock-collapsed";
      function setDockCollapsed(collapsed) {
        dock.classList.toggle("collapsed", collapsed);
        dockToggle.textContent = collapsed ? "›" : "‹";
        dockToggle.title = collapsed ? "Show feedback targets" : "Hide feedback targets";
        try { localStorage.setItem(DOCK_KEY, collapsed ? "1" : "0"); } catch (e) {}
      }
      setDockCollapsed((() => { try { return localStorage.getItem(DOCK_KEY) === "1"; } catch (e) { return false; } })());
      dockToggle.onclick = () => setDockCollapsed(!dock.classList.contains("collapsed"));
      document.getElementById("scene-target").onclick = (e) => openScopedComposer("scene", e.currentTarget);
      document.getElementById("audio-target").onclick = (e) => openScopedComposer("audio", e.currentTarget);
      document.getElementById("span-target").onclick = (e) => openScopedComposer("span", e.currentTarget);

      const STATUS_CYCLE = ["open", "resolved", "wontfix"];
      // Humans never set "addressed" — that's the agent's write-back signal. A click on an
      // addressed note VERIFIES it → resolved; otherwise step the human cycle. (Without this,
      // indexOf("addressed") === -1 would wrongly send addressed → open.) A status-only PATCH
      // leaves any resolution record intact, so the audit trail survives the verify click.
      function nextStatus(cur) {
        if (cur === "addressed") return "resolved";
        const idx = STATUS_CYCLE.indexOf(cur || "open");
        return STATUS_CYCLE[(idx + 1) % STATUS_CYCLE.length];
      }
      async function cycleStatus(note, ev) {
        ev.stopPropagation();
        const next = nextStatus(note.status || "open");
        const res = await fetch(`${API}/${encodeURIComponent(note.id)}`, {
          method: "PATCH",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ status: next }),
        });
        if (!res.ok) flash("Status update failed");
        loadNotes();
      }

      // Severity cycle for the drawer chip: unset → blocker → major → nit → unset. PATCH sends null
      // to clear (the server deletes the field). Mirrors cycleStatus; the drawer list stays
      // chronological — severity is shown as a chip, not used to reorder the human-facing list.
      const SEVERITY_CYCLE = [null, "blocker", "major", "nit"];
      async function cycleSeverity(note, ev) {
        ev.stopPropagation();
        const idx = SEVERITY_CYCLE.indexOf(note.severity || null);
        const next = SEVERITY_CYCLE[(idx + 1) % SEVERITY_CYCLE.length];
        const res = await fetch(`${API}/${encodeURIComponent(note.id)}`, {
          method: "PATCH",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ severity: next }),
        });
        if (!res.ok) flash("Severity update failed");
        loadNotes();
      }

      // ---- notes list + markers ----
      async function loadNotes() {
        // Guard res.ok + shape: a 500 from /api/notes (e.g. a corrupt annotations.json the server
        // preserved) returns an {error} object, not an array — sorting that would throw and silently
        // kill the panel. Fall back to empty + a flash instead.
        let ok = true;
        try {
          const res = await fetch(API, { cache: "no-cache" });
          ok = res.ok; // a 500 (e.g. corrupt annotations.json the server preserved) → fall back + warn
          notes = res.ok ? await res.json() : [];
        } catch { ok = false; notes = []; }
        if (!ok || !Array.isArray(notes)) {
          notes = [];
          flash("Couldn't load notes — annotations.json may be invalid");
        }
        notes.sort((a, b) => a.time - b.time);
        toggleNotesBtn.textContent = `Notes (${notes.length})`;
        renderMarkers();
        renderList();
      }
      function renderMarkers() {
        pins.querySelectorAll(".pin, .region, .ghost-box").forEach((p) => p.remove());
        ghostLayer.querySelectorAll(".note-arrow").forEach((p) => p.remove());
        markerEls = [];
        notes.forEach((n) => {
          const color = colorFor(n.id);
          const [start, end] = sceneWindow(n); // each marker shows only within the note's scene window
          // Per-branch guards (not a single `n.x == null` early-out) so an arrow or a desiredBox renders
          // even on a note without pin coords, and pins/regions keep rendering exactly as before.
          if (n.x != null) {
            const marker = document.createElement("div");
            marker.style.left = `${n.x}%`;
            marker.style.top = `${n.y}%`;
            marker.style.setProperty("--c", color);
            if (n.w != null) {
              marker.className = "region";
              marker.style.width = `${n.w}%`;
              marker.style.height = `${n.h}%`;
              const badge = document.createElement("div");
              badge.className = "rbadge";
              badge.textContent = n.id;
              marker.appendChild(badge);
            } else {
              marker.className = "pin";
              marker.textContent = n.id;
            }
            marker.title = `${fmt(n.time)} — ${n.text}`;
            marker.onmouseenter = () => flashTarget(n.target, color);
            marker.onclick = (ev) => { ev.stopPropagation(); seekToNote(n, color); };
            pins.appendChild(marker);
            markerEls.push({ el: marker, start, end });
          }
          // Desired-state ghost box — where/how big the element should be (dashed, in the note's color).
          if (n.desiredBox) {
            const g = document.createElement("div");
            g.className = "ghost-box";
            g.style.left = `${n.desiredBox.x}%`;
            g.style.top = `${n.desiredBox.y}%`;
            g.style.width = `${n.desiredBox.w}%`;
            g.style.height = `${n.desiredBox.h}%`;
            g.style.setProperty("--c", color);
            const badge = document.createElement("div");
            badge.className = "gbadge";
            badge.textContent = "→ here";
            g.appendChild(badge);
            g.title = `note ${n.id} — desired target`;
            g.onmouseenter = () => flashTarget(n.target, color);
            g.onclick = (ev) => { ev.stopPropagation(); seekToNote(n, color); };
            pins.appendChild(g);
            markerEls.push({ el: g, start, end });
          }
          // Desired-state arrow — a from→to direction in comp coords on the SVG overlay.
          if (n.arrow) {
            const line = document.createElementNS(SVG_NS, "line");
            line.setAttribute("class", "note-arrow");
            line.setAttribute("x1", (n.arrow.x1 / 100) * compW);
            line.setAttribute("y1", (n.arrow.y1 / 100) * compH);
            line.setAttribute("x2", (n.arrow.x2 / 100) * compW);
            line.setAttribute("y2", (n.arrow.y2 / 100) * compH);
            line.setAttribute("stroke", "#fbbf24"); // amber = "desired", one semantic across live/saved/packet
            line.setAttribute("stroke-width", "2.5");
            line.setAttribute("vector-effect", "non-scaling-stroke");
            line.setAttribute("marker-end", "url(#vellum-arrowhead)");
            ghostLayer.appendChild(line);
            markerEls.push({ el: line, start, end });
          }
        });
        updateMarkerVisibility(player ? player.getTime() : 0);
        renderNoteDots();
      }
      // A colored dot above the scrubber for each note, at its point on the timeline,
      // matching that note's pin/region color. Click to jump there.
      function renderNoteDots() {
        noteDots.innerHTML = "";
        if (!duration) return;
        notes.forEach((n) => {
          if (n.time == null) return;
          const pct = timelinePct(n.time);
          if (pct < 0 || pct > 100) return;
          const dot = document.createElement("div");
          // Stale dot = the targeted element no longer resolves OR the composition's index.html
          // changed since the note was pinned (content drift). Guarded by n.provenance &&.
          // Suppressed once a note is addressed/resolved: a changed/removed target is the EXPECTED
          // outcome of a successful agent edit, so the re-verify signal would otherwise misfire.
          const status = n.status || "open";
          const verified = status === "addressed" || status === "resolved";
          const contentStale = n.provenance && baselineHash && n.provenance.indexHash && n.provenance.indexHash !== baselineHash;
          const stale = !verified && (contentStale || (n.target && compDoc && !resolveTargetEl(n.target)));
          dot.className = `note-dot${n.kind === "scene" ? " dot-scene" : n.kind === "audio" ? " dot-audio" : n.kind === "span" ? " dot-span" : ""}${stale ? " dot-stale" : ""}`;
          dot.style.left = `${pct}%`;
          dot.style.setProperty("--c", colorFor(n.id));
          dot.onclick = (ev) => { ev.stopPropagation(); player.pause(); player.seek(n.time); };
          dot.addEventListener("mouseenter", () => showNoteTip(n, dot));
          dot.addEventListener("mouseleave", hideNoteTip);
          noteDots.appendChild(dot);
          // A note carrying a valid interval grows a colored bar from its dot to the end point.
          if (n.timeEnd != null && n.timeEnd > n.time) {
            const endPct = Math.min(100, timelinePct(n.timeEnd));
            const bar = document.createElement("div");
            bar.className = "note-span";
            bar.style.left = `${pct}%`;
            bar.style.width = `${Math.max(0, endPct - pct)}%`;
            bar.style.setProperty("--c", colorFor(n.id));
            noteDots.appendChild(bar);
          }
        });
      }
      // Hover preview floating above a timeline dot: scene + timecode, then the note text.
      // Fixed-positioned from the dot's on-screen rect so it sits above the viewer rather
      // than being clipped by it; centered over the dot and clamped to the window edges.
      const kindGlyph = (n) => n.kind === "scene" ? "▣ " : n.kind === "audio" ? "🔊 " : n.kind === "span" ? "↔ " : "";
      function showNoteTip(n, dot) {
        noteTip.style.setProperty("--c", colorFor(n.id));
        const scope = n.kind === "scene" ? " · whole scene" : n.kind === "audio" ? " · audio" : n.kind === "span" ? " · time span" : "";
        const span = n.timeEnd != null && n.timeEnd > n.time;
        noteTipMeta.textContent = `${kindGlyph(n)}note-${n.id} · ${span ? `${fmt(n.time)}–${fmt(n.timeEnd)}` : fmt(n.time)}${n.scene ? ` · ${n.scene}` : ""}${n.severity ? ` · ${n.severity}` : ""}${scope}${n.attachments && n.attachments.length ? " · 📎" : ""}`;
        const text = (n.text || "").trim();
        noteTipText.textContent = text || "(no text)";
        noteTipText.classList.toggle("empty", !text);
        noteTip.style.display = "block"; // show first so offsetWidth/Height measure correctly
        const r = dot.getBoundingClientRect();
        const half = noteTip.offsetWidth / 2;
        const cx = Math.min(Math.max(r.left + r.width / 2, half + 8), window.innerWidth - half - 8);
        noteTip.style.left = `${cx}px`;
        noteTip.style.top = `${r.top - noteTip.offsetHeight - 12}px`;
      }
      function hideNoteTip() { noteTip.style.display = "none"; }
      function renderList() {
        noteList.innerHTML = "";
        notes.forEach((n) => {
          const status = n.status || "open";
          const statusCls = status !== "open" ? ` ${status}` : "";
          const span = n.timeEnd != null && n.timeEnd > n.time;
          // A changed/removed target (or content drift) is the EXPECTED outcome of a successful
          // agent edit, so suppress the re-verify badges once a note is addressed/resolved.
          const verified = status === "addressed" || status === "resolved";
          const item = document.createElement("div");
          item.className = `note-item${statusCls}`;
          item.style.borderLeftColor = colorFor(n.id);
          item.style.borderLeftWidth = "3px";
          const actions = document.createElement("div");
          actions.className = "actions";
          // Reviewer severity chip — color-coded, click to cycle; neutral '+sev' affordance when unset.
          const sevBtn = document.createElement("button");
          sevBtn.className = `sev-chip${n.severity ? ` ${n.severity}` : ""}`;
          sevBtn.title = "Cycle severity (blocker → major → nit → none)";
          sevBtn.textContent = n.severity || "+sev";
          sevBtn.onclick = (ev) => cycleSeverity(n, ev);
          const statusBtn = document.createElement("button");
          statusBtn.className = `status${statusCls}`;
          statusBtn.title = "Cycle status";
          statusBtn.textContent = status;
          statusBtn.onclick = (ev) => cycleStatus(n, ev);
          const edit = document.createElement("button");
          edit.className = "edit"; edit.title = "Edit note"; edit.textContent = "✎";
          edit.onclick = (ev) => {
            ev.stopPropagation();
            const r = item.getBoundingClientRect();
            openComposerForEdit(n, r.left, r.top);
          };
          const del = document.createElement("button");
          del.className = "del"; del.title = "Delete"; del.textContent = "✕";
          del.onclick = async (ev) => {
            ev.stopPropagation();
            const res = await fetch(`${API}/${encodeURIComponent(n.id)}`, { method: "DELETE" });
            if (!res.ok) flash("Delete failed");
            loadNotes();
          };
          actions.append(sevBtn, statusBtn, edit, del);
          const nt = document.createElement("span");
          nt.className = "nt"; nt.textContent = `note-${n.id} · ${span ? `${fmt(n.time)}–${fmt(n.timeEnd)}` : fmt(n.time)}`;
          const ns = document.createElement("span");
          ns.className = "ns"; ns.textContent = " " + (n.scene || "");
          const nx = document.createElement("div");
          nx.className = "nx"; nx.textContent = n.text;
          item.append(actions, nt, ns);
          if (n.kind === "scene" || n.kind === "audio" || n.kind === "span") {
            const badge = document.createElement("div");
            badge.className = `nkind${n.kind === "audio" ? " audio" : n.kind === "span" ? " span" : ""}`;
            badge.textContent = n.kind === "scene" ? "▣ whole scene"
              : n.kind === "audio" ? "🔊 audio"
              : `↔ time span${span ? ` ${(n.timeEnd - n.time).toFixed(2)}s` : ""}`;
            item.append(badge);
            if (n.kind === "audio") {
              const tg = document.createElement("div");
              tg.className = "ntg";
              tg.textContent = audioSummary(n.audio);
              item.append(tg);
            }
          } else if (n.target) {
            const tg = document.createElement("div");
            tg.className = "ntg";
            tg.textContent = `on ${targetLabel(n.target)}`;
            item.append(tg);
            // The targeted element no longer resolves (the composition changed under the note) —
            // flag it for re-verification rather than silently pointing at nothing. Suppressed for
            // addressed/resolved notes (a missing target is the expected result of the agent's edit).
            if (!verified && compDoc && !resolveTargetEl(n.target)) {
              const stale = document.createElement("div");
              stale.className = "stale";
              stale.title = "This note's element can't be found in the current composition — re-check it";
              stale.textContent = "⚠ unresolved — re-verify";
              item.append(stale);
            }
          }
          // A point note (element/region/pin) that also carries an in/out interval → a small chip.
          if (n.kind !== "span" && span) {
            const chip = document.createElement("div");
            chip.className = "nspan";
            chip.textContent = `↔ ${(n.timeEnd - n.time).toFixed(2)}s span`;
            item.append(chip);
          }
          // Content drift: the composition's index.html changed since this note was pinned
          // (cross-session). Factual regardless of whether the DOM target still resolves;
          // guarded by n.provenance && so pre-feature notes render exactly as before. Suppressed
          // for addressed/resolved notes (the drift is the expected result of the agent's edit).
          if (!verified && n.provenance && baselineHash && n.provenance.indexHash && n.provenance.indexHash !== baselineHash) {
            const drift = document.createElement("div");
            drift.className = "stale";
            drift.title = "The composition's index.html changed since this note was pinned — re-verify before applying";
            drift.textContent = "⚠ pinned against older composition — re-verify";
            item.append(drift);
          }
          // Agent write-back: surface what the consuming agent changed so a human can verify it.
          if (n.resolution) {
            const r = n.resolution;
            const nres = document.createElement("div");
            nres.className = "nres";
            nres.title = "What the agent changed — verify, then mark resolved";
            nres.textContent = `✓ addressed by ${r.by || "agent"}${r.summary ? `: ${r.summary}` : ""}`;
            item.append(nres);
          }
          // Reference-image hint — a small count chip with the first thumbnail. The agent opens the
          // actual file via the path in annotations.json/md; img.src is an attribute (never innerHTML).
          if (n.attachments && n.attachments.length) {
            const natt = document.createElement("div");
            natt.className = "natt";
            natt.title = "Reference image(s) attached — see annotations for the openable path";
            const thumb = document.createElement("img");
            thumb.src = attUrl(n.attachments[0].file);
            thumb.alt = "";
            const lbl = document.createElement("span");
            lbl.textContent = `📎 ${n.attachments.length} image${n.attachments.length > 1 ? "s" : ""}`;
            natt.append(thumb, lbl);
            item.append(natt);
          }
          item.append(nx);
          // Hover a note row → flash its element in the composition (in the note's
          // color), so you can verify the note still points at the right thing after
          // edits. Click seeks first so the element's scene is actually on screen.
          item.onmouseenter = () => flashTarget(n.target, colorFor(n.id));
          item.onclick = () => seekToNote(n, colorFor(n.id));
          noteList.appendChild(item);
        });
      }
      toggleNotesBtn.onclick = () => notesPanel.classList.toggle("open");
      document.getElementById("close-notes").onclick = () => notesPanel.classList.remove("open");
      document.getElementById("refresh-notes").onclick = loadNotes;
      async function clearAllNotes() {
        if (!notes.length) { flash("No notes to clear"); return; }
        if (!confirm(`Clear all ${notes.length} note(s)? This can't be undone.`)) return;
        await fetch(API, { method: "DELETE" });
        flash("All notes cleared");
        loadNotes();
      }
      document.getElementById("clear-notes").onclick = clearAllNotes;
      document.getElementById("clear-all").onclick = clearAllNotes;

      mount().catch((err) => {
        stage.innerHTML = `<div class="hint" style="padding:40px;max-width:620px">Failed to mount: ${err.message}<br><br>Run Vellum from your HyperFrames project root (the folder with <code>index.html</code> and <code>node_modules/hyperframes</code>):<br><br><code>vellum</code><br><br>Composition in a subfolder?<br><code>VELLUM_DIR=compositions/hero vellum</code></div>`;
        console.error(err);
      });
    </script>
  </body>
</html>
