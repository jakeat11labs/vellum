<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vellum — Review &amp; Annotate</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; background: #0b0b0d; color: #e8e8ea; font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; overflow: hidden; }
      #wrap { position: fixed; inset: 0; display: flex; flex-direction: column; }
      #viewport { position: relative; flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; }

      /* Scaled composition stage — the real index.html runs inside #comp (an iframe). */
      #stage { position: relative; }
      #stage #comp { display: block; border: 0; transform-origin: top left; background: #000; box-shadow: 0 12px 60px rgba(0,0,0,0.6); }

      /* Pin/region layer overlays the scaled iframe exactly */
      #pins { position: absolute; inset: 0; pointer-events: none; }
      #pins.arming { pointer-events: auto; cursor: crosshair; }
      /* Per-note color rides in on --c (set inline) so :hover can brighten it. */
      .pin { position: absolute; transform: translate(-50%, -50%); pointer-events: auto; width: 26px; height: 26px; border-radius: 50% 50% 50% 2px; background: var(--c, #5eead4); border: 2px solid #0b0b0d; color: #06231f; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.5); transition: filter .12s ease, box-shadow .12s ease; }
      .pin:hover { filter: brightness(1.25); box-shadow: 0 0 10px var(--c, #5eead4); }
      .region { position: absolute; pointer-events: auto; border: 2px solid var(--c, #5eead4); border-radius: 4px; background: color-mix(in srgb, var(--c, #5eead4) 13%, transparent); cursor: pointer; transition: background .12s ease, box-shadow .12s ease; }
      .region:hover { background: color-mix(in srgb, var(--c, #5eead4) 24%, transparent); box-shadow: 0 0 10px color-mix(in srgb, var(--c, #5eead4) 60%, transparent); }
      .region .rbadge { position: absolute; top: -13px; left: -2px; background: var(--c, #5eead4); color: #06231f; font-size: 12px; font-weight: 700; border-radius: 6px 6px 6px 0; padding: 1px 6px; }
      #dragbox { position: absolute; border: 2px dashed #5eead4; background: rgba(94,234,212,0.12); display: none; pointer-events: none; }

      /* Note composer popover */
      #composer { position: absolute; z-index: 30; width: 340px; background: #17171b; border: 1px solid #2c2c32; border-radius: 12px; padding: 12px; box-shadow: 0 14px 50px rgba(0,0,0,0.6); display: none; }
      #composer .meta { font-size: 12px; color: #8b8b93; margin-bottom: 4px; }
      #composer .tgt { font-size: 12px; color: #5eead4; margin-bottom: 8px; word-break: break-word; }
      #composer textarea { width: 100%; height: 78px; resize: vertical; background: #0e0e11; color: #e8e8ea; border: 1px solid #2c2c32; border-radius: 8px; padding: 8px; font: inherit; font-size: 14px; }
      #composer .row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }
      button { font: inherit; cursor: pointer; border-radius: 8px; border: 1px solid #2c2c32; background: #1f1f25; color: #e8e8ea; padding: 7px 12px; }
      button.primary { background: #5eead4; color: #06231f; border-color: #5eead4; font-weight: 600; }
      button:hover { filter: brightness(1.12); }
      button.active { background: #5eead4; color: #06231f; border-color: #5eead4; }

      /* Control bar — single row, grouped by hairline separators */
      #bar { display: flex; align-items: center; gap: 0; padding: 0 14px; height: 52px; background: #121216; border-top: 1px solid #25252b; flex-wrap: nowrap; overflow: hidden; }
      #bar .sep { width: 1px; height: 20px; background: #25252b; margin: 0 10px; flex-shrink: 0; }
      /* Logo */
      #bar .brandwrap { display: flex; align-items: center; gap: 7px; padding-right: 2px; flex-shrink: 0; }
      #bar .brand-mark { width: 26px; height: 26px; display: block; flex-shrink: 0; filter: drop-shadow(0 0 5px rgba(94,234,212,0.45)); }
      #bar .brand { font-weight: 700; letter-spacing: 0.06em; color: #c8c8d0; font-size: 12px; }
      /* Transport */
      #bar .transport { display: flex; align-items: center; gap: 1px; flex-shrink: 0; }
      #bar .transport button { width: 32px; height: 32px; padding: 0; font-size: 12px; display: flex; align-items: center; justify-content: center; background: transparent; border-color: transparent; border-radius: 6px; }
      #bar .transport button:hover { background: #1f1f25; border-color: #2c2c32; }
      #bar #play { width: 36px; height: 36px; font-size: 14px; background: #1f1f25; border-color: #2c2c32; }
      /* Scrubber + time + scene */
      #scrubwrap { position: relative; flex: 1; min-width: 80px; margin: 0 10px; display: flex; align-items: center; }
      #scrub { width: 100%; accent-color: #5eead4; height: 4px; margin: 0; cursor: pointer; position: relative; z-index: 1; }
      /* Faint vertical ghost lines marking scene breaks (where ⏮/⏭ land) */
      .scene-ticks { position: absolute; left: 0; right: 0; top: 50%; height: 16px; transform: translateY(-50%); pointer-events: none; z-index: 0; }
      .scene-tick { position: absolute; top: 0; width: 1px; height: 100%; background: rgba(255,255,255,0.16); }
      /* Colored dots above the bar, one per note, at its point on the timeline */
      .note-dots { position: absolute; left: 0; right: 0; top: 50%; height: 0; pointer-events: none; z-index: 2; }
      .note-dot { position: absolute; top: -11px; width: 9px; height: 9px; border-radius: 50%; transform: translateX(-50%); background: var(--c, #5eead4); border: 1.5px solid #121216; box-shadow: 0 0 4px rgba(0,0,0,0.55); pointer-events: auto; cursor: pointer; transition: transform .12s ease, filter .12s ease; }
      .note-dot:hover { transform: translateX(-50%) scale(1.4); filter: brightness(1.2); }
      #tc { font-variant-numeric: tabular-nums; font-size: 12px; color: #b9b9c0; white-space: nowrap; flex-shrink: 0; letter-spacing: 0.02em; }
      #scene-tag { font-size: 11px; color: #5eead4; max-width: 88px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex-shrink: 1; margin: 0 6px; }
      #copy-scene { padding: 4px 6px; color: #4a4a54; background: transparent; border-color: transparent; font-size: 13px; flex-shrink: 0; }
      #copy-scene:hover { color: #b9b9c0; }
      /* Audio mix */
      .amix { display: inline-flex; align-items: center; gap: 5px; flex-shrink: 0; }
      .amix .lbl { font-size: 10px; font-weight: 600; letter-spacing: 0.07em; color: #5a5a63; text-transform: uppercase; }
      .amix input[type=range] { width: 58px; accent-color: #5eead4; height: 3px; cursor: pointer; }
      .amix .val { font-variant-numeric: tabular-nums; width: 22px; color: #6b6b73; font-size: 10px; text-align: right; }
      #save-mix { padding: 5px 9px; font-size: 12px; flex-shrink: 0; }
      /* Action group */
      #bar .actions { display: flex; align-items: center; gap: 3px; flex-shrink: 0; }
      #bar .actions button { padding: 5px 10px; font-size: 12px; height: 32px; flex-shrink: 0; }
      #arm { background: rgba(94,234,212,0.08); border-color: rgba(94,234,212,0.22); color: #5eead4; font-size: 12px; }
      #arm:hover { background: rgba(94,234,212,0.15); border-color: rgba(94,234,212,0.35); }
      #copy-prompt { padding: 5px 8px; color: #4a4a54; background: transparent; border-color: transparent; font-size: 14px; }
      #copy-prompt:hover { color: #b9b9c0; }
      #clear-all { padding: 5px 8px; color: #4a4a54; background: transparent; border-color: transparent; font-size: 15px; }
      #clear-all:hover { color: #ff6b6b; filter: none; }

      /* Notes drawer */
      #notes { position: absolute; top: 0; right: 0; bottom: 0; width: 360px; background: #101014; border-left: 1px solid #25252b; transform: translateX(100%); transition: transform .2s ease; z-index: 25; display: flex; flex-direction: column; }
      #notes.open { transform: none; }
      #notes header { padding: 14px 16px; border-bottom: 1px solid #25252b; display: flex; align-items: center; justify-content: space-between; }
      #notes header h2 { margin: 0; font-size: 15px; }
      #note-list { flex: 1; overflow: auto; padding: 8px; }
      .note-item { padding: 10px 12px; border: 1px solid #25252b; border-radius: 10px; margin-bottom: 8px; cursor: pointer; }
      .note-item:hover { border-color: #5eead4; }
      .note-item.resolved { opacity: 0.72; }
      .note-item.wontfix { opacity: 0.55; }
      .note-item .actions { float: right; display: flex; gap: 4px; align-items: center; }
      .note-item .status { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; border: 1px solid #2c2c32; border-radius: 999px; padding: 2px 7px; color: #8b8b93; background: #17171b; }
      .note-item .status.resolved { color: #5eead4; border-color: #2d4f49; }
      .note-item .status.wontfix { color: #b9b9c0; }
      .note-item .edit { color: #8b8b93; border: none; background: none; padding: 0 2px; }
      .note-item .edit:hover { color: #5eead4; }
      .note-item .nt { font-variant-numeric: tabular-nums; color: #5eead4; font-size: 12px; font-weight: 700; }
      .note-item .ns { color: #8b8b93; font-size: 11px; }
      .note-item .ntg { color: #6f8fa6; font-size: 11px; margin-top: 2px; word-break: break-word; }
      .note-item .nx { font-size: 14px; margin-top: 3px; white-space: pre-wrap; }
      .note-item .del { float: right; color: #8b8b93; border: none; background: none; padding: 0 2px; }
      .note-item .del:hover { color: #ff6b6b; }
      #status { position: absolute; left: 18px; bottom: 70px; z-index: 40; background: #17171b; border: 1px solid #2c2c32; border-radius: 8px; padding: 8px 12px; font-size: 13px; opacity: 0; transition: opacity .2s; pointer-events: none; max-width: 60%; }
      #status.show { opacity: 1; }
      .hint { font-size: 13px; color: #9a9aa4; line-height: 1.5; }
    </style>
  </head>
  <body>
    <div id="wrap">
      <div id="viewport">
        <div id="stage"><div class="hint" style="padding:40px">Loading composition…</div></div>
        <div id="pins"><div id="dragbox"></div></div>
        <div id="composer">
          <div class="meta" id="composer-meta"></div>
          <div class="tgt" id="composer-tgt"></div>
          <textarea id="composer-text" placeholder="What's the note? (e.g. make this bubble bigger, cut 2s here, caption lands late)"></textarea>
          <div class="row">
            <button id="composer-cancel">Cancel</button>
            <button id="composer-save" class="primary">Save note</button>
          </div>
        </div>
        <div id="status"></div>
      </div>

      <div id="bar">
        <span class="brandwrap">
          <svg class="brand-mark" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M4 4l6 16M20 4l-6 16M10 20h4" stroke="#5eead4" stroke-width="3" stroke-linecap="round"/>
          </svg>
          <span class="brand">VELLUM</span>
        </span>
        <div class="sep"></div>
        <div class="transport">
          <button id="prev-scene" title="Previous scene (↑)">⏮</button>
          <button id="play" title="Play / pause (space)">▶</button>
          <button id="next-scene" title="Next scene (↓)">⏭</button>
        </div>
        <div id="scrubwrap">
          <div class="scene-ticks" id="scene-ticks"></div>
          <input id="scrub" type="range" min="0" max="100" step="0.01" value="0" />
          <div class="note-dots" id="note-dots"></div>
        </div>
        <span id="tc">0:00.00 / 0:00.00</span>
        <div class="sep"></div>
        <span id="scene-tag"></span>
        <button id="copy-scene" title="Copy current scene name">⧉</button>
        <div class="sep"></div>
        <span class="amix" title="Voiceover level">
          <span class="lbl">VO</span>
          <input id="voice-vol" type="range" min="0" max="1" step="0.01" value="1" />
          <span class="val" id="voice-val">100</span>
        </span>
        <span class="amix" title="Music bed level" style="margin-left:8px">
          <span class="lbl">MX</span>
          <input id="music-vol" type="range" min="0" max="1" step="0.01" value="0.2" />
          <span class="val" id="music-val">20</span>
        </span>
        <button id="save-mix" title="Save mix levels to notes/mix.json" style="margin-left:8px">Mix</button>
        <div class="sep"></div>
        <div class="actions">
          <button id="arm" title="Add note — N, then click or drag">＋ Add note</button>
          <button id="toggle-notes">Notes (0)</button>
          <button id="copy-prompt" title="Copy agent handoff prompt">📋</button>
          <button id="clear-all" title="Delete every note">🗑</button>
        </div>
      </div>

      <div id="notes">
        <header>
          <h2>Review notes</h2>
          <div>
            <button id="refresh-notes" title="Reload">⟳</button>
            <button id="clear-notes" title="Clear all">Clear</button>
            <button id="close-notes" title="Close panel">✕</button>
          </div>
        </header>
        <div id="note-list"></div>
      </div>
    </div>

    <script type="module">
      const API = "/api/notes";
      // Stable Vellum endpoint — the server resolves the real HyperFrames runtime file
      // (local node_modules → npx cache → CDN), so the dist filename is never hardcoded here.
      const RUNTIME = "/__vellum/runtime.js";

      const NOTE_PALETTE = ["#5eead4","#f472b6","#facc15","#a78bfa","#fb923c","#60a5fa","#4ade80","#f87171","#22d3ee","#e879f9","#fcd34d","#34d399"];

        for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;

      // ---- scenes (generic: read [data-start] direct children of the composition root) ----
      function buildScenes(doc) {
        const root = doc.querySelector("[data-composition-id]") || doc.getElementById("root") || doc.body;
        const out = [];
        for (const el of root.children) {
          if (el.tagName === "AUDIO" || el.tagName === "SCRIPT") continue;
          if (!el.hasAttribute("data-start")) continue;
          out.push({
            id: el.id || el.className.split(/\s+/)[0] || `scene-${out.length + 1}`,
            start: Number(el.getAttribute("data-start")) || 0,
            duration: el.hasAttribute("data-duration") ? Number(el.getAttribute("data-duration")) : null,

      }

      function applyMix() {

      // the correct state every frame. 0.3s drift tolerance avoids fighting the runtime.

            }
            if (a.paused) a.play().catch(() => {});
          } else if (!a.paused) {
            a.pause();
          }
        }
      }

          playBtn.textContent = player.isPlaying() ? "❚❚" : "▶";
          updateMarkerVisibility(t);
          applyMix();
          syncAudio();

      playBtn.onclick = () => (player.isPlaying() ? player.pause() : player.play());
      scrub.oninput = () => { player.pause(); player.seek(Number(scrub.value)); };

      function jumpScene(dir) {
        const starts = scenes.map((s) => s.start).sort((a, b) => a - b);
        if (!starts.length) return;

        if (dir > 0) {

          if (target == null) target = starts[starts.length - 1];

          target = prevs.length ? prevs[prevs.length - 1] : 0;

        if (!name) return;
        try { await navigator.clipboard.writeText(name); flash(`Copied scene "${name}"`); }
        catch (e) { flash("Copy failed — clipboard blocked"); }
      };
      document.getElementById("copy-prompt").onclick = async () => {
        const prompt = 'Address my Vellum review notes in notes/annotations.md';
        try { await navigator.clipboard.writeText(prompt); flash("Copied agent prompt"); }
        catch (e) { flash("Copy failed — clipboard blocked"); }
      };

      // ---- annotation: point pin or drag region ----
      armBtn.onclick = () => {
        arming = !arming;
        armBtn.classList.toggle("active", arming);
        pins.classList.toggle("arming", arming);
        flash(arming ? "Click a spot, or drag a box, to mark feedback" : "Add-note off");
      };

      // Identify the composition element under a screen point (inside the iframe doc).
      function captureTarget(clientX, clientY) {
        const iframe = stage.querySelector("#comp");
        const r = iframe.getBoundingClientRect();
        const s = r.width / compW;
        const ix = (clientX - r.left) / s;
        const iy = (clientY - r.top) / s;
        const el = compDoc.elementFromPoint(ix, iy);
        const root = compDoc.querySelector("[data-composition-id]") || compDoc.getElementById("root");
        if (!el || !root || !root.contains(el)) return null;
        let node = el;
        while (node && node !== root && !(typeof node.className === "string" && node.className.trim())) {
          node = node.parentElement;
        }
        if (!node || node === root) node = el;
        const cls = typeof node.className === "string" ? node.className.trim().split(/\s+/).slice(0, 3).join(".") : "";
        const text = (node.textContent || "").replace(/\s+/g, " ").trim().slice(0, 80);
        return { tag: node.tagName.toLowerCase(), cls, text };
      }

      let dragStart = null;
      pins.addEventListener("mousedown", (e) => {
        if (!arming) return;
        const r = pins.getBoundingClientRect();
        dragStart = { x: e.clientX - r.left, y: e.clientY - r.top, cx: e.clientX, cy: e.clientY };
        dragbox.style.left = `${dragStart.x}px`;
        dragbox.style.top = `${dragStart.y}px`;
        dragbox.style.width = "0px";
        dragbox.style.height = "0px";
        dragbox.style.display = "block";
      });
      pins.addEventListener("mousemove", (e) => {
        if (!dragStart) return;
        const r = pins.getBoundingClientRect();
        const cx = e.clientX - r.left, cy = e.clientY - r.top;
        dragbox.style.left = `${Math.min(dragStart.x, cx)}px`;
        dragbox.style.top = `${Math.min(dragStart.y, cy)}px`;
        dragbox.style.width = `${Math.abs(cx - dragStart.x)}px`;
        dragbox.style.height = `${Math.abs(cy - dragStart.y)}px`;
      });
      pins.addEventListener("mouseup", (e) => {
        if (!arming || !dragStart) return;
        const r = pins.getBoundingClientRect();
        const ex = e.clientX - r.left, ey = e.clientY - r.top;
        const dpx = Math.abs(ex - dragStart.x), dpy = Math.abs(ey - dragStart.y);
        dragbox.style.display = "none";
        const time = player.getTime();
        const target = captureTarget(dragStart.cx, dragStart.cy);
        const toPct = (v, dim) => Math.round((v / dim) * 1000) / 10;

        if (dpx < 6 && dpy < 6) {
          pending = { time, x: toPct(dragStart.x, r.width), y: toPct(dragStart.y, r.height), scene: sceneAt(time), target };
        } else {
          const left = Math.min(dragStart.x, ex), top = Math.min(dragStart.y, ey);
          pending = {
            time, scene: sceneAt(time), target,
            x: toPct(left, r.width), y: toPct(top, r.height),
            w: toPct(dpx, r.width), h: toPct(dpy, r.height),
          };
        }
        openComposer(e.clientX, e.clientY);
        dragStart = null;
        arming = false;
        armBtn.classList.remove("active");
        pins.classList.remove("arming");
      });

      const composerSaveBtn = document.getElementById("composer-save");

      function openComposer(clientX, clientY) {
        const region = pending.w != null;
        const editLabel = pending.editId ? `note-${pending.editId} · edit` : "new note";
        composerMeta.textContent = `${editLabel} · ${fmt(pending.time)} · ${pending.scene || ""} · ${region ? `box ${pending.w}×${pending.h}%` : `pin ${pending.x}%, ${pending.y}%`}`;
        composerTgt.textContent = pending.target
          ? `on ${pending.target.tag}${pending.target.cls ? "." + pending.target.cls : ""}${pending.target.text ? ` — “${pending.target.text}”` : ""}`
          : "";
        composerText.value = pending.text || "";
        composerSaveBtn.textContent = pending.editId ? "Save changes" : "Save note";
        const vp = document.getElementById("viewport").getBoundingClientRect();
        composer.style.left = `${Math.min(clientX - vp.left, vp.width - 360)}px`;
        composer.style.top = `${Math.min(clientY - vp.top + 14, vp.height - 220)}px`;
        composer.style.display = "block";
        composerText.focus();
      }

      function openComposerForEdit(note, clientX, clientY) {
        pending = { ...note, editId: note.id };
        openComposer(clientX, clientY);
      }

      document.getElementById("composer-cancel").onclick = () => { composer.style.display = "none"; pending = null; };
      composerSaveBtn.onclick = async () => {
        const text = composerText.value.trim();
        if (!text || !pending) { composer.style.display = "none"; return; }
        if (pending.editId) {
          const res = await fetch(`${API}/${encodeURIComponent(pending.editId)}`, {
            method: "PATCH",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ text }),
          });
          if (!res.ok) { flash("Update failed"); return; }
        } else {
          await fetch(API, { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ ...pending, text }) });
        }
        composer.style.display = "none";
        pending = null;
        flash("Note saved");
        loadNotes();
      };

      const STATUS_CYCLE = ["open", "resolved", "wontfix"];
      async function cycleStatus(note, ev) {
        ev.stopPropagation();
        const idx = STATUS_CYCLE.indexOf(note.status || "open");
        const next = STATUS_CYCLE[(idx + 1) % STATUS_CYCLE.length];
        const res = await fetch(`${API}/${encodeURIComponent(note.id)}`, {
          method: "PATCH",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ status: next }),
        });
        if (!res.ok) flash("Status update failed");
        loadNotes();
      }

      // ---- notes list + markers ----
      async function loadNotes() {
        try { notes = await (await fetch(API, { cache: "no-cache" })).json(); } catch { notes = []; }
        notes.sort((a, b) => a.time - b.time);
        toggleNotesBtn.textContent = `Notes (${notes.length})`;
        renderMarkers();
        renderList();
      }
      function renderMarkers() {
        pins.querySelectorAll(".pin, .region").forEach((p) => p.remove());
        markerEls = [];
        notes.forEach((n) => {
          if (n.x == null) return;
          const color = colorFor(n.id);
          let marker;
          if (n.w != null) {
            marker = document.createElement("div");
            marker.className = "region";
            marker.style.left = `${n.x}%`;
            marker.style.top = `${n.y}%`;
            marker.style.width = `${n.w}%`;
            marker.style.height = `${n.h}%`;
            marker.style.setProperty("--c", color);
            const badge = document.createElement("div");
            badge.className = "rbadge";
            badge.textContent = n.id;
            marker.appendChild(badge);
          } else {
            marker = document.createElement("div");
            marker.className = "pin";
            marker.style.left = `${n.x}%`;
            marker.style.top = `${n.y}%`;
            marker.style.setProperty("--c", color);
            marker.textContent = n.id;
          }
          marker.title = `${fmt(n.time)} — ${n.text}`;
          marker.onclick = (ev) => { ev.stopPropagation(); player.pause(); player.seek(n.time); };
          pins.appendChild(marker);
          const [start, end] = sceneWindow(n);
          markerEls.push({ el: marker, start, end });
        });
        updateMarkerVisibility(player ? player.getTime() : 0);
        renderNoteDots();
      }
      // A colored dot above the scrubber for each note, at its point on the timeline,
      // matching that note's pin/region color. Click to jump there.
      function renderNoteDots() {
        noteDots.innerHTML = "";
        if (!duration) return;
        notes.forEach((n) => {
          if (n.time == null) return;
          const pct = (n.time / duration) * 100;
          if (pct < 0 || pct > 100) return;
          const dot = document.createElement("div");
          dot.className = "note-dot";
          dot.style.left = `${pct}%`;
          dot.style.setProperty("--c", colorFor(n.id));
          dot.title = `note-${n.id} · ${fmt(n.time)} — ${n.text || ""}`;
          dot.onclick = (ev) => { ev.stopPropagation(); player.pause(); player.seek(n.time); };
          noteDots.appendChild(dot);
        });
      }
      function renderList() {
        noteList.innerHTML = "";
        notes.forEach((n) => {
          const status = n.status || "open";
          const item = document.createElement("div");
          item.className = `note-item${status !== "open" ? ` ${status}` : ""}`;
          item.style.borderLeftColor = colorFor(n.id);
          item.style.borderLeftWidth = "3px";
          const actions = document.createElement("div");
          actions.className = "actions";
          const statusBtn = document.createElement("button");
          statusBtn.className = `status${status !== "open" ? ` ${status}` : ""}`;
          statusBtn.title = "Cycle status";
          statusBtn.textContent = status;
          statusBtn.onclick = (ev) => cycleStatus(n, ev);
          const edit = document.createElement("button");
          edit.className = "edit"; edit.title = "Edit note"; edit.textContent = "✎";
          edit.onclick = (ev) => {
            ev.stopPropagation();
            const r = item.getBoundingClientRect();
            openComposerForEdit(n, r.left, r.top);
          };
          const del = document.createElement("button");
          del.className = "del"; del.title = "Delete"; del.textContent = "✕";
          del.onclick = async (ev) => {
            ev.stopPropagation();
            const res = await fetch(`${API}/${encodeURIComponent(n.id)}`, { method: "DELETE" });
            if (!res.ok) flash("Delete failed");
            loadNotes();
          };
          actions.append(statusBtn, edit, del);
          const nt = document.createElement("span");
          nt.className = "nt"; nt.textContent = `note-${n.id} · ${fmt(n.time)}`;
          const ns = document.createElement("span");
          ns.className = "ns"; ns.textContent = " " + (n.scene || "");
          const nx = document.createElement("div");
          nx.className = "nx"; nx.textContent = n.text;
          item.append(actions, nt, ns);
          if (n.target) {
            const tg = document.createElement("div");
            tg.className = "ntg";
            tg.textContent = `on ${n.target.tag}${n.target.cls ? "." + n.target.cls : ""}${n.target.text ? ` — “${n.target.text}”` : ""}`;
            item.append(tg);
          }
          item.append(nx);
          item.onclick = () => { player.pause(); player.seek(n.time); };
          noteList.appendChild(item);
        });
      }
      toggleNotesBtn.onclick = () => notesPanel.classList.toggle("open");
      document.getElementById("close-notes").onclick = () => notesPanel.classList.remove("open");
      document.getElementById("refresh-notes").onclick = loadNotes;
      async function clearAllNotes() {
        if (!notes.length) { flash("No notes to clear"); return; }
        if (!confirm(`Clear all ${notes.length} note(s)? This can't be undone.`)) return;
        await fetch(API, { method: "DELETE" });
        flash("All notes cleared");
        loadNotes();
      }
      document.getElementById("clear-notes").onclick = clearAllNotes;
      document.getElementById("clear-all").onclick = clearAllNotes;

      mount().catch((err) => {
        stage.innerHTML = `<div class="hint" style="padding:40px;max-width:620px">Failed to mount: ${err.message}<br><br>Run Vellum from your HyperFrames project root (the folder with <code>index.html</code> and <code>node_modules/hyperframes</code>):<br><br><code>vellum</code><br><br>Composition in a subfolder?<br><code>VELLUM_DIR=compositions/hero vellum</code></div>`;
        console.error(err);
      });
    </script>
  </body>
</html>
