name: release

# Publish to npm when a version tag is pushed:
#   git tag v0.5.0 && git push --tags
# The bash installer keeps serving the same commit from `main`, so npm and the
# curl|sh path ship in lockstep — npm just carries the tagged, version-checked build.

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: npm

      # Refuse to publish if the tag and the two in-repo version strings disagree,
      # so npm and the bash installer can never drift to mismatched versions.
      - name: Check version sync
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          SRC="$(sed -n 's/.*VERSION = "\([^"]*\)".*/\1/p' scripts/vellum-shared.mjs)"
          echo "tag=$TAG  package.json=$PKG  vellum-shared.mjs=$SRC"
          if [ "$TAG" != "$PKG" ] || [ "$TAG" != "$SRC" ]; then
            echo "::error::version mismatch — tag '$TAG', package.json '$PKG', and vellum-shared.mjs '$SRC' must all match"
            exit 1
          fi

      - run: npm ci
      - run: npm run typecheck
      - run: npm test

      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
